<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MAPS Workout">
<title>MAPS Aesthetic</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; }
:root { --phase1:#1B3A5C;--phase2:#4A235A;--phase3:#7A1A1A;--accent:#C8A45A;--bg:#fff;--bg2:#f5f5f5;--border:rgba(0,0,0,0.12);--text:#1a1a1a;--text2:#6b6b6b; }
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#2a2a2a;--border:rgba(255,255,255,0.12);--text:#f0f0f0;--text2:#999}body{background:var(--bg);color:var(--text)}.exercise-card{background:var(--bg2)}.phase-btn{color:var(--text2);border-color:var(--border)}.day-btn{color:var(--text2)}.bottom-bar,.congrats-box,.panel-box{background:var(--bg)}.type-fundamental{background:#0c3a5a;color:#7ab8e8}.type-accesorio{background:#2a2a2a;color:#999}.type-superset{background:#5a2010;color:#e8987a}.cal-day.trained{background:#3a2000;color:#C8A45A}.timer-bar{background:#2a2a2a}}
.app{max-width:430px;margin:0 auto;padding:0 0 80px;min-height:100vh}
.header{padding:16px 16px 10px;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
.header-actions{display:flex;align-items:center;gap:10px}
.progress-label{font-size:12px;color:var(--text2)}
.icon-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--text2);display:flex;align-items:center;-webkit-tap-highlight-color:transparent}
.phase-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.phase-tabs::-webkit-scrollbar{display:none}
.phase-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .2s;font-family:inherit}
.phase-btn.active{color:white;border-color:transparent}
.phase-btn[data-phase="0"].active{background:var(--phase1)}
.phase-btn[data-phase="1"].active{background:var(--phase2)}
.phase-btn[data-phase="2"].active{background:var(--phase3)}
.day-tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--bg);position:sticky;top:83px;z-index:9}
.day-btn{flex:1;padding:12px 8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.day-btn.active{color:var(--text);border-bottom-color:var(--accent)}
.timer-bar{display:none;background:var(--bg2);border-bottom:0.5px solid var(--border);padding:10px 16px;align-items:center;gap:12px}
.timer-bar.active{display:flex}
.timer-ring{position:relative;width:40px;height:40px;flex-shrink:0}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring-bg{fill:none;stroke:var(--border);stroke-width:3}
.timer-ring-fill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.timer-number{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text)}
.timer-label{flex:1}
.timer-title{font-size:13px;font-weight:500;color:var(--text)}
.timer-sub{font-size:11px;color:var(--text2);margin-top:1px}
.timer-skip{padding:6px 14px;border-radius:20px;border:0.5px solid var(--border);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.day-header{padding:16px 16px 8px}
.day-title{font-size:20px;font-weight:600;color:var(--text)}
.day-subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.day-progress{margin-top:10px}
.progress-bar-bg{height:4px;background:var(--border);border-radius:2px}
.progress-bar-fill{height:4px;border-radius:2px;background:var(--accent);transition:width .4s ease}
.progress-text{font-size:11px;color:var(--text2);margin-top:4px}
.section-label{padding:10px 16px 4px;font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.06em;text-transform:uppercase}
.exercise-card{margin:4px 12px;border-radius:12px;border:0.5px solid var(--border);background:var(--bg);overflow:hidden;transition:opacity .2s}
.exercise-card.done{opacity:.45}
.exercise-card.done .ex-name{text-decoration:line-through}
.ex-row{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.check-circle{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;background:transparent}
.check-circle.checked{background:var(--accent);border-color:var(--accent)}
.check-icon{width:12px;height:12px;display:none}
.check-circle.checked .check-icon{display:block}
.checkmark{stroke:white;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{font-size:12px;color:var(--text2);margin-top:1px}
.ex-type{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;flex-shrink:0}
.type-fundamental{background:#E6F1FB;color:#185FA5}
.type-accesorio{background:#F1EFE8;color:#5F5E5A}
.type-superset{background:#FAECE7;color:#993C1D}
.superset-sub{padding:0 14px 10px 50px}
.superset-line{font-size:12px;color:var(--text2);padding:3px 0 3px 10px;border-left:2px solid var(--border)}
.note-text{font-size:11px;color:var(--text2);padding:0 14px 10px 50px;font-style:italic}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));display:flex;gap:10px;max-width:430px;margin:0 auto;z-index:50}
.btn-reset{flex:1;padding:10px;border-radius:8px;border:0.5px solid var(--border);background:transparent;font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn-complete{flex:2;padding:10px;border-radius:8px;border:none;background:var(--accent);color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .2s;-webkit-tap-highlight-color:transparent}
.btn-complete:disabled{opacity:.35;cursor:default}
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:flex-end;justify-content:center;z-index:100}
.panel-overlay.show{display:flex}
.panel-box{background:var(--bg);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.panel-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.panel-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px}
.panel-sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.timer-options{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.timer-opt{flex:1;min-width:55px;padding:12px 8px;border-radius:10px;border:1px solid var(--border);background:transparent;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;font-family:inherit;text-align:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
.timer-opt.active{background:var(--accent);color:white;border-color:var(--accent)}
.timer-custom{margin-bottom:20px}
.timer-custom label{font-size:13px;color:var(--text2);display:block;margin-bottom:8px}
.timer-slider{width:100%;accent-color:var(--accent)}
.timer-custom-val{font-size:28px;font-weight:600;color:var(--text);text-align:center;margin-top:10px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month{font-size:15px;font-weight:600;color:var(--text)}
.cal-nav-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:4px 10px;font-family:inherit}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px}
.cal-header{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:4px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;color:var(--text2)}
.cal-day.today{border:1.5px solid var(--accent);color:var(--text);font-weight:600}
.cal-day.trained{background:var(--accent);color:white;font-weight:600}
.history-list{display:flex;flex-direction:column;gap:8px}
.history-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border-radius:12px}
.history-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0}
.history-info{flex:1}
.history-name{font-size:13px;font-weight:500;color:var(--text)}
.history-date{font-size:11px;color:var(--text2);margin-top:1px}
.history-badge{font-size:11px;font-weight:600;color:white;background:var(--accent);padding:2px 8px;border-radius:10px}
.empty-history{text-align:center;padding:30px 0;color:var(--text2);font-size:14px;line-height:1.6}
.congrats-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:200}
.congrats-overlay.show{display:flex}
.congrats-box{background:var(--bg);border-radius:16px;padding:32px 24px;text-align:center;max-width:300px;margin:16px}
.congrats-icon{font-size:48px;margin-bottom:12px}
.congrats-title{font-size:22px;font-weight:600;color:var(--text);margin-bottom:8px}
.congrats-sub{font-size:14px;color:var(--text2);line-height:1.5}
.congrats-btn{margin-top:20px;padding:10px 28px;border-radius:8px;border:none;background:var(--accent);color:white;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.stats-row{display:flex;gap:8px;margin-bottom:20px}
.stat-card{flex:1;background:var(--bg2);border-radius:12px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:600;color:var(--accent)}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.section-divider{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <span class="app-title">MAPS Aesthetic</span>
      <div class="header-actions">
        <span class="progress-label" id="global-progress">0/0</span>
        <button class="icon-btn" onclick="openHistory()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="8" cy="15" r="1.2" fill="currentColor"/><circle cx="12" cy="15" r="1.2" fill="currentColor"/><circle cx="16" cy="15" r="1.2" fill="currentColor"/></svg>
        </button>
        <button class="icon-btn" onclick="openTimerSettings()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><polyline points="12 9 12 13 14.5 15.5"/><line x1="9" y1="2" x2="15" y2="2"/></svg>
        </button>
      </div>
    </div>
    <div class="phase-tabs" id="phase-tabs"></div>
  </div>

  <div class="timer-bar" id="timer-bar">
    <div class="timer-ring">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle class="timer-ring-bg" cx="20" cy="20" r="17"/>
        <circle class="timer-ring-fill" id="timer-ring-fill" cx="20" cy="20" r="17" stroke-dasharray="107" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-number" id="timer-number">90</div>
    </div>
    <div class="timer-label">
      <div class="timer-title">Descansando...</div>
      <div class="timer-sub" id="timer-sub">Siguiente ejercicio listo</div>
    </div>
    <button class="timer-skip" onclick="stopTimer()">Saltar</button>
  </div>

  <div class="day-tabs" id="day-tabs"></div>
  <div id="content"></div>
</div>

<div style="height:80px"></div>

<div class="bottom-bar">
  <button class="btn-reset" onclick="resetDay()">Reiniciar día</button>
  <button class="btn-complete" id="btn-complete" onclick="completeDay()">Completar sesión</button>
</div>

<!-- TIMER PANEL -->
<div class="panel-overlay" id="timer-panel">
  <div class="panel-box">
    <div class="panel-handle"></div>
    <div class="panel-title">Temporizador de descanso</div>
    <div class="panel-sub">Se activa automáticamente al marcar cada ejercicio</div>
    <div class="timer-options">
      <button class="timer-opt" data-val="30" onclick="selectTimerPreset(30)">30s</button>
      <button class="timer-opt" data-val="60" onclick="selectTimerPreset(60)">1 min</button>
      <button class="timer-opt" data-val="90" onclick="selectTimerPreset(90)">1:30</button>
      <button class="timer-opt" data-val="120" onclick="selectTimerPreset(120)">2 min</button>
      <button class="timer-opt" data-val="180" onclick="selectTimerPreset(180)">3 min</button>
    </div>
    <div class="timer-custom">
      <label>Personalizar: <strong id="slider-label">90 segundos</strong></label>
      <input type="range" class="timer-slider" id="timer-slider" min="15" max="300" step="15" value="90" oninput="onSliderChange(this.value)">
      <div class="timer-custom-val" id="timer-custom-val">1:30</div>
    </div>
    <button class="btn-complete" style="width:100%" onclick="saveTimerSettings()">Guardar configuración</button>
  </div>
</div>

<!-- HISTORY PANEL -->
<div class="panel-overlay" id="history-panel">
  <div class="panel-box">
    <div class="panel-handle"></div>
    <div class="panel-title">Historial de sesiones</div>
    <div class="panel-sub">Tu progreso en MAPS Aesthetic</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Sesiones</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">Racha</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-week">0</div><div class="stat-label">Esta semana</div></div>
    </div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="cal-month" id="cal-month-label"></span>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="section-divider">Últimas sesiones</div>
    <div class="history-list" id="history-list"></div>
    <button class="btn-reset" style="width:100%;margin-top:16px" onclick="closeHistory()">Cerrar</button>
  </div>
</div>

<!-- CONGRATS -->
<div class="congrats-overlay" id="congrats">
  <div class="congrats-box">
    <div class="congrats-icon">🏆</div>
    <div class="congrats-title" id="congrats-title">¡Sesión completada!</div>
    <div class="congrats-sub" id="congrats-sub">Buen trabajo.</div>
    <button class="congrats-btn" onclick="closeCongracts()">Continuar</button>
  </div>
</div>

<script>
const DATA={phases:[{name:"Fase I",subtitle:"Semanas 1-3 · Fuerza",days:[{name:"Lunes",subtitle:"Día 1 — Empuje y pierna",groups:[{label:"Fundamentales",exercises:[{name:"Sentadilla con mancuernas",meta:"5 series · 2-5 reps",type:"fundamental",note:"Movimiento base, peso máximo"},{name:"Peso muerto rumano con mancuernas",meta:"3 series · 6-8 reps",type:"fundamental"},{name:"Press banca inclinado con mancuernas",meta:"4 series · 3-6 reps",type:"fundamental"},{name:"Remo con mancuernas agarre supino",meta:"4 series · 4-6 reps",type:"fundamental"},{name:"Encogimientos con mancuernas",meta:"4 series · 5-7 reps",type:"fundamental"},{name:"Press de empuje con mancuernas",meta:"3 series · 3-6 reps",type:"fundamental"}]},{label:"Accesorios",exercises:[{name:"Elevaciones laterales traseras",meta:"1 serie · 8-12 reps",type:"accesorio"},{name:"Curl de bíceps con mancuernas",meta:"4 series · 6-8 reps",type:"accesorio"},{name:"Press francés con mancuernas",meta:"4 series · 6-8 reps",type:"accesorio"},{name:"Elevaciones de piernas",meta:"3 series · 10-12 reps",type:"accesorio"},{name:"Elevaciones de gemelos de pie",meta:"3 series · 10-20 reps",type:"accesorio"}]}]},{name:"Miércoles",subtitle:"Día 2 — Tirón y hombros",groups:[{label:"Fundamentales",exercises:[{name:"Peso muerto",meta:"5 series · 1-4 reps",type:"fundamental",note:"Movimiento base principal"},{name:"Encogimientos con mancuernas",meta:"2 series · 4-6 reps",type:"fundamental"},{name:"Dominadas con peso",meta:"3 series · 4-8 reps",type:"fundamental"},{name:"Zancadas caminando",meta:"3 series · 10 reps c/pierna",type:"fundamental"},{name:"Press banca inclinado con mancuernas",meta:"5 series · 6-8 reps",type:"fundamental"},{name:"Press Arnold sentado",meta:"4 series · 6-8 reps",type:"fundamental"}]},{label:"Accesorios",exercises:[{name:"Aperturas traseras con mancuernas",meta:"1 serie · 8-10 reps",type:"accesorio"},{name:"Curl alternado supinado",meta:"4 series · 6-8 reps",type:"accesorio"},{name:"Fondos en paralelas",me  de gemelos de pie",meta:"3 series · 10-20 reps",type:"accesorio"}]}]},{name:"Miércoles",subtitle:"Día 2 — Hipertrofia B",groups:[{label:"Fundamentales",exercises:[{name:"Peso muerto",meta:"3 series · 8-12 reps",type:"fundamental"},{name:"Press banca inclinado con mancuernas",meta:"3 series · 8-12 reps",type:"fundamental"},{name:"Dominadas",meta:"3 series · 8-12 reps",type:"fundamental"},{name:"Encogimientos con mancuernas",meta:"3 series · 8-12 reps",type:"fundamental"},{name:"Elevaciones laterales con mancuernas",meta:"3 series · 8-12 reps",type:"fundamental"}]},{label:"Accesorios",exercises:[{name:"Elevaciones laterales traseras",meta:"2 series · 8-12 reps",type:"accesorio"},{name:"Curl martillo alternado",meta:"4 series · 8-12 reps",type:"accesorio"},{name:"Press agarre cerrado con mancuernas",meta:"4 series · 8-12 reps",type:"accesorio"},{name:"V-Ups alternados",meta:"3 series · 10-20 reps",type:"accesorio"},{name:"Elevaciones de gemelos de pie",meta:"3 series · 10-20 reps",type:"accesorio"}]}]},{name:"Viernes",subtitle:"Día 3 — Hipertrofia C",groups:[{label:"Fundamentales",exercises:[{name:"Step up con mancuernas",meta:"3 series · 8-12 reps",type:"fundamental"},{name:"Peso muerto a una pierna",meta:"2 series · 10-12 reps",type:"fundamental"},{name:"Remo con mancuernas codos abiertos",meta:"3 series · 8-12 reps",type:"fundamental"},{name:"Press banca inclinado con mancuernas",meta:"3 series · 8-12 reps",type:"fundamental"},{name:"Encogimientos con mancuernas",meta:"3 series · 8-12 reps",type:"fundamental"}]},{label:"Accesorios",exercises:[{name:"Curl araña con mancuernas",meta:"3 series · 10-12 reps",type:"accesorio"},{name:"Fondos en paralelas",meta:"3 series · 10-12 reps",type:"accesorio"},{name:"Giros declinados",meta:"3 series · 10-12 reps",type:"accesorio"},{name:"Elevaciones de gemelos de pie",meta:"3 series · 10-20 reps",type:"accesorio"}]}]}]},{name:"Fase III",subtitle:"Semanas 8-10 · Definición",days:[{name:"Lunes",subtitle:"Día 1 — Supersets A",groups:[{label:"Supersets",exercises:[{name:"Sentadilla con mancuernas",meta:"4 series · 8-12 reps",type:"superset",sub:"+ Sentadilla con carga frontal  4×10-15",note:"Sin descanso entre ambos"},{name:"Press banca inclinado con mancuernas",meta:"4 series · 8-12 reps",type:"superset",sub:"+ Aperturas con mancuernas  4×10-15",note:"Sin descanso entre ambos"},{name:"Dominadas",meta:"4 series · 8-12 reps",type:"superset",sub:"+ Remo con mancuerna a un brazo  4×10-15",note:"Sin descanso entre ambos"},{name:"Press de hombros con mancuernas",meta:"4 series · 8-12 reps",type:"superset",sub:"+ Elevaciones laterales traseras  4×10-15",note:"Sin descanso entre ambos"},{name:"Curl de bíceps con mancuernas",meta:"4 series · 8-12 reps",type:"superset",sub:"+ Curl martillo alternado  4×10-15",note:"Sin descanso entre ambos"},{name:"Press agarre cerrado con mancuernas",meta:"4 series · 8-12 reps",type:"superset",sub:"+ Fondos agarre cerrado  4×10-15",note:"Sin descanso entre ambos"}]},{label:"Accesorios",exercises:[{name:"Elevaciones de piernas colgado",meta:"3 series · 8-12 reps",type:"accesorio"},{name:"Elevaciones de gemelos de pie",meta:"4 series · 10-15 reps",type:"accesorio"}]}]},{name:"Miércoles",subtitle:"Día 2 — Supersets B",groups:[{label:"Supersets",exercises:[{name:"Peso muerto sumo con mancuernas",meta:"4 series · 5-7 reps",type:"superset",sub:"+ Dominadas AMRAP  4×8-12",note:"AMRAP = máx. reps posibles"},{name:"Curl de pierna con fitball",meta:"4 series · 8-12 reps",type:"superset",sub:"+ Sentadilla búlgara con mancuernas  4×10-15",note:"Sin descanso entre ambos"},{name:"Press de banca con mancuernas",meta:"4 series · 8-12 reps",type:"superset",sub:"+ Press de banca con mancuernas  4×10-15",note:"Sin descanso entre ambos"},{name:"Press de hombros con mancuernas",meta:"4 series · 8-12 reps",type:"superset",sub:"+ Elevaciones laterales con mancuernas  4×10-15",note:"Sin descanso entre ambos"}]},{label:"Accesorios",exercises:[{name:"Curl de bíceps 21s con mancuernas",meta:"4 series · 7+7+7 reps",type:"accesorio",note:"7 bajo + 7 alto + 7 completo"},{name:"Press francés inclinado 21s",meta:"4 series · 7+7+7 reps",type:"accesorio",note:"7 bajo + 7 alto + 7 completo"},{name:"Abdominales con fitball",meta:"3 series · 10-20 reps",type:"accesorio"},{name:"Elevaciones de gemelos a una pierna",meta:"3 series · 10-20 reps",type:"accesorio"}]}]},{name:"Viernes",subtitle:"Día 3 — Supersets C",groups:[{label:"Supersets",exercises:[{name:"Sentadilla con mancuernas",meta:"4 series · 8-12 reps",type:"superset",sub:"+ Sentadilla sissy con mancuernas  4×10-15",note:"Sin descanso entre ambos"},{name:"Press con mancuernas",meta:"4 series · 8-12 reps",type:"superset",sub:"+ Aperturas con mancuernas  4×8-12",note:"Sin descanso entre ambos"},{name:"Remo supino con mancuernas",meta:"4 series · 10-15 reps",type:"superset",sub:"+ Remo con mancuerna a un brazo  4×10-15",note:"Sin descanso entre ambos"},{name:"Press de hombros con mancuernas",meta:"4 series · 10-15 reps",type:"superset",sub:"+ Remo vertical con mancuernas  4×8-12",note:"Sin descanso entre ambos"},{name:"Curl alternado supinado sentado",meta:"4 series · 10-12 reps",type:"superset",sub:"+ Press francés con mancuernas  4×10-12",note:"Sin descanso entre ambos"}]},{label:"Accesorios",exercises:[{name:"Abdominales con fitball",meta:"4 series · 10-20 reps",type:"accesorio"},{name:"Plancha",meta:"4 series · 60 segundos",type:"accesorio"},{name:"Elevaciones de gemelos de pie",meta:"4 series · 10-20 reps",type:"accesorio"}]}]}]}]};

let currentPhase=0,currentDay=0,checked={};
let timerDuration=parseInt(localStorage.getItem('maps_timer')||'90');
let timerRemaining=0,timerInterval=null;
let calViewDate=new Date();

function getHistory(){try{return JSON.parse(localStorage.getItem('maps_history')||'[]')}catch{return[]}}
function saveSession(p,d){const h=getHistory();h.push({date:new Date().toISOString(),phase:p,day:d});localStorage.setItem('maps_history',JSON.stringify(h))}
function todayStr(){return new Date().toISOString().slice(0,10)}
function dateStr(iso){return iso.slice(0,10)}

function fmtSec(s){const m=Math.floor(s/60),r=s%60;return m>0?`${m}:${r.toString().padStart(2,'0')}`:`${s}s`}

function startTimer(name){
  stopTimer();timerRemaining=timerDuration;updateTimerUI(name);
  document.getElementById('timer-bar').classList.add('active');
  timerInterval=setInterval(()=>{timerRemaining--;if(timerRemaining<=0){stopTimer();return}updateTimerUI(name)},1000);
}
function stopTimer(){clearInterval(timerInterval);timerInterval=null;document.getElementById('timer-bar').classList.remove('active')}
function updateTimerUI(name){
  const C=2*Math.PI*17,p=timerRemaining/timerDuration,off=C*(1-p);
  document.getElementById('timer-ring-fill').style.strokeDasharray=C;
  document.getElementById('timer-ring-fill').style.strokeDashoffset=off;
  document.getElementById('timer-number').textContent=timerRemaining;
  document.getElementById('timer-sub').textContent=name||'Siguiente ejercicio listo';
}

function openTimerSettings(){
  document.getElementById('timer-slider').value=timerDuration;
  document.getElementById('timer-custom-val').textContent=fmtSec(timerDuration);
  document.getElementById('slider-label').textContent=`${timerDuration} segundos`;
  document.querySelectorAll('.timer-opt').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.val)===timerDuration));
  document.getElementById('timer-panel').classList.add('show');
}
function selectTimerPreset(v){
  timerDuration=v;
  document.getElementById('timer-slider').value=v;
  document.getElementById('timer-custom-val').textContent=fmtSec(v);
  document.getElementById('slider-label').textContent=`${v} segundos`;
  document.querySelectorAll('.timer-opt').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.val)===v));
}
function onSliderChange(v){
  v=parseInt(v);timerDuration=v;
  document.getElementById('timer-custom-val').textContent=fmtSec(v);
  document.getElementById('slider-label').textContent=`${v} segundos`;
  document.querySelectorAll('.timer-opt').forEach(b=>b.classList.remove('active'));
}
function saveTimerSettings(){localStorage.setItem('maps_timer',timerDuration);document.getElementById('timer-panel').classList.remove('show')}

function openHistory(){calViewDate=new Date();renderCalendar();renderHistoryList();renderStats();document.getElementById('history-panel').classList.add('show')}
function closeHistory(){document.getElementById('history-panel').classList.remove('show')}
function changeMonth(d){calViewDate.setMonth(calViewDate.getMonth()+d);renderCalendar()}

function renderCalendar(){
  const h=getHistory(),trained=new Set(h.map(s=>dateStr(s.date))),today=todayStr();
  const y=calViewDate.getFullYear(),m=calViewDate.getMonth();
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('cal-month-label').textContent=`${months[m]} ${y}`;
  const first=(new Date(y,m,1).getDay()+6)%7,days=new Date(y,m+1,0).getDate();
  let html=['L','M','X','J','V','S','D'].map(d=>`<div class="cal-header">${d}</div>`).join('');
  for(let i=0;i<first;i++)html+='<div class="cal-day"></div>';
  for(let d=1;d<=days;d++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const tr=trained.has(iso),is=iso===today;
    html+=`<div class="cal-day${tr?' trained':''}${is&&!tr?' today':''}">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}
function renderStats(){
  const h=getHistory();document.getElementById('stat-total').textContent=h.length;
  const now=new Date(),ws=new Date(now);ws.setDate(now.getDate()-((now.getDay()+6)%7));
  document.getElementById('stat-week').textContent=h.filter(s=>new Date(s.date)>=ws).length;
  const ts=new Set(h.map(s=>dateStr(s.date)));let streak=0,d=new Date();
  while(ts.has(d.toISOString().slice(0,10))){streak++;d.setDate(d.getDate()-1)}
  document.getElementById('stat-streak').textContent=streak;
}
function renderHistoryList(){
  const h=getHistory().slice().reverse().slice(0,10),el=document.getElementById('history-list');
  if(!h.length){el.innerHTML='<div class="empty-history">Aún no hay sesiones.<br>¡Completa tu primera sesión!</div>';return}
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  el.innerHTML=h.map(s=>{const d=new Date(s.date);return`<div class="history-item"><div class="history-dot"></div><div class="history-info"><div class="history-name">${s.phase} · ${s.day}</div><div class="history-date">${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}</div></div><div class="history-badge">✓</div></div>`}).join('');
}

function key(p,d,g,e){return`${p}-${d}-${g}-${e}`}
function totalEx(p,d){return DATA.phases[p].days[d].groups.reduce((s,g)=>s+g.exercises.length,0)}
function checkedCount(p,d){let c=0;DATA.phases[p].days[d].groups.forEach((g,gi)=>g.exercises.forEach((_,ei)=>{if(checked[key(p,d,gi,ei)])c++}));return c}
function allChecked(p,d){return checkedCount(p,d)===totalEx(p,d)}

function renderPhaseTabs(){
  document.getElementById('phase-tabs').innerHTML=DATA.phases.map((ph,i)=>
    `<button class="phase-btn${i===currentPhase?' active':''}" data-phase="${i}" onclick="selectPhase(${i})">${ph.name}<br><span style="font-weight:400;font-size:10px">${ph.subtitle}</span></button>`).join('');
}
function renderDayTabs(){
  document.getElementById('day-tabs').innerHTML=DATA.phases[currentPhase].days.map((d,i)=>
    `<button class="day-btn${i===currentDay?' active':''}" onclick="selectDay(${i})">${d.name}</button>`).join('');
}
function typeLabel(t){
  if(t==='fundamental')return'<span class="ex-type type-fundamental">Fundamental</span>';
  if(t==='superset')return'<span class="ex-type type-superset">Superset</span>';
  return'<span class="ex-type type-accesorio">Accesorio</span>';
}
function renderContent(){
  const ph=DATA.phases[currentPhase],day=ph.days[currentDay];
  const total=totalEx(currentPhase,currentDay),done=checkedCount(currentPhase,currentDay),pct=total>0?Math.round(done/total*100):0;
  document.getElementById('global-progress').textContent=`${done}/${total}`;
  let html=`<div class="day-header"><div class="day-title">${day.name} — ${ph.name}</div><div class="day-subtitle">${day.subtitle}</div><div class="day-progress"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="progress-text">${pct}% · ${done} de ${total} ejercicios</div></div></div>`;
  day.groups.forEach((group,gi)=>{
    html+=`<div class="section-label">${group.label}</div>`;
    group.exercises.forEach((ex,ei)=>{
      const ck=checked[key(currentPhase,currentDay,gi,ei)];
      const safeName=ex.name.replace(/'/g,"\\'");
      html+=`<div class="exercise-card${ck?' done':''}"><div class="ex-row" onclick="toggle(${gi},${ei},'${safeName}')"><div class="check-circle${ck?' checked':''}"><svg class="check-icon" viewBox="0 0 12 12"><polyline class="checkmark" points="2,6 5,9 10,3"/></svg></div><div class="ex-info"><div class="ex-name">${ex.name}</div><div class="ex-meta">${ex.meta}</div></div>${typeLabel(ex.type)}</div>${ex.sub?`<div class="superset-sub"><div class="superset-line">${ex.sub}</div></div>`:''}${ex.note?`<div class="note-text">${ex.note}</div>`:''}</div>`;
    });
  });
  document.getElementById('content').innerHTML=html;
  document.getElementById('btn-complete').disabled=!allChecked(currentPhase,currentDay);
}

function toggle(gi,ei,name){
  const k=key(currentPhase,currentDay,gi,ei),was=checked[k];
  checked[k]=!was;
  if(!was)startTimer(name);
  renderContent();
}
function selectPhase(i){currentPhase=i;currentDay=0;stopTimer();renderAll()}
function selectDay(i){currentDay=i;stopTimer();renderContent();renderDayTabs()}
function renderAll(){renderPhaseTabs();renderDayTabs();renderContent()}
function resetDay(){DATA.phases[currentPhase].days[currentDay].groups.forEach((g,gi)=>g.exercises.forEach((_,ei)=>{delete checked[key(currentPhase,currentDay,gi,ei)]}));stopTimer();renderContent()}
function completeDay(){
  const ph=DATA.phases[currentPhase],day=ph.days[currentDay];
  saveSession(ph.name,day.name);
  document.getElementById('congrats-title').textContent='¡Sesión completada!';
  document.getElementById('congrats-sub').textContent=`${day.name} de ${ph.name} registrado. Descansa bien y vuelve fuerte 💪`;
  document.getElementById('congrats').classList.add('show');
}
function closeCongracts(){document.getElementById('congrats').classList.remove('show')}

document.querySelectorAll('.panel-overlay').forEach(p=>p.addEventListener('click',e=>{if(e.target===p)p.classList.remove('show')}));
renderAll();
</script>
